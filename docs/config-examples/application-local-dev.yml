integration:
  api-keys: ["dev-api-key"]
  anonymous-access:
    enabled: true
    subject-id: anonymous-dev
    permissions: ["queue-view", "queue-call", "queue-aggregate", "metrics-view", "event-process", "branch-state-view", "branch-state-manage", "programmable-script-manage", "programmable-script-execute"]
  queue-cache-ttl: 15s
  visit-managers:
    - id: vm-main
      base-url: http://localhost:8081
      region-id: dev
      active: true
  branch-routing:
    BR-001: vm-main
