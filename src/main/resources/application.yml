micronaut:
  application:
    name: integration-api
  router:
    static-resources:
      swagger:
        paths: classpath:swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:swagger-ui
        mapping: /swagger-ui/**
      integration-ui:
        paths: classpath:ui
        mapping: /ui/**

integration:
  security-mode: API_KEY
  anonymous-access:
    enabled: false
    subject-id: anonymous-debug
    permissions: ["queue-view", "queue-call", "queue-aggregate", "metrics-view", "event-process", "branch-state-view", "branch-state-manage", "programmable-script-manage", "programmable-script-execute"]
  internal-signing-key: dev-signing-key
  internal-clients:
    - client-id: integration-admin
      client-secret: integration-secret
      permissions: ["queue-view", "queue-call", "queue-aggregate", "metrics-view", "event-process", "branch-state-view", "branch-state-manage", "programmable-script-manage", "programmable-script-execute"]
  keycloak:
    issuer: ""
    audience: ""
    shared-secret: dev-keycloak-secret
  local-subject-permissions: {}
  api-keys:
    - dev-api-key
  programmable-api:
    enabled: true
    http-processing:
      enabled: true
      add-direction-header: true
      direction-header-name: X-Integration-Direction
      request-envelope-enabled: false
      response-body-max-chars: 4000
      parse-json-body: true
    script-storage:
      redis:
        enabled: false
        host: localhost
        port: 6379
        database: 0
        password: ""
        key-prefix: "integration:groovy:script:"
      file:
        enabled: true
        path: cache/program-scripts
    external-rest-services:
      - id: customer-crm
        base-url: http://localhost:8090
        default-headers: {}
    message-brokers:
      - id: customer-databus
        type: LOGGING
        enabled: true
        properties: {}
    message-reactions:
      - broker-id: customer-databus
        topic: branch.state.changed
        script-id: branch-state-reaction
        enabled: true
    endpoints:
      - id: queuesByBranch
        operation: FETCH_QUEUES
        required-permission: queue-view
      - id: aggregateQueues
        operation: AGGREGATE_QUEUES
        required-permission: queue-aggregate
  client-policy:
    retry-attempts: 2
    timeout-millis: 1000
    circuit-failure-threshold: 3
    circuit-open-seconds: 10
  eventing:
    enabled: true
    state-persistence-enabled: true
    state-persistence-path: cache/eventing-state/snapshot.json
    outbox-backoff-seconds: 5
    outbox-max-attempts: 20
    outbox-auto-flush-enabled: false
    outbox-auto-flush-batch-size: 100
    outbox-auto-flush-interval: 30s
    outbox-auto-flush-initial-delay: 10s
    inbox-processing-timeout-seconds: 120
    max-retries: 2
    max-payload-fields: 100
    max-future-skew-seconds: 300
    dlq-warn-threshold: 10
    duplicate-warn-threshold: 50
    max-dlq-events: 5000
    max-processed-events: 20000
    retention-seconds: 604800
    snapshot-import-max-events: 50000
    snapshot-import-require-matching-processed-keys: true
    snapshot-import-reject-cross-list-duplicates: true
    kafka:
      enabled: false
      inbound-topic: integration.inbound
      outbound-topic: integration.outbound
    webhook:
      enabled: false
      url: ""
      auth-header: Authorization
      auth-token: ""
      target-systems: []
      connect-timeout-millis: 1000
      read-timeout-millis: 3000
      headers: {}
    entity-changed-branch-mapping:
      enabled: true
      event-type: ENTITY_CHANGED
      class-name-paths: ["className", "class", "entityClass", "data.class", "data.entityClass", "data.entity.class", "meta.class", "meta.entityClass"]
      accepted-class-names: ["Branch"]
      branch-id-paths: ["newValue.id", "oldValue.id", "data.branch.id", "data.branchId", "data.branch_id", "data.entity.id", "data.entity.branchId", "branch.id", "branchId", "branch_id"]
      status-paths: ["newValue.status", "oldValue.status", "data.state.status", "data.state.code", "data.status", "data.entity.state.status", "data.entity.status", "status", "state"]
      active-window-paths: ["newValue.activeWindow", "newValue.resetTime", "oldValue.activeWindow", "oldValue.resetTime", "data.state.activeWindow", "data.state.active_window", "data.activeWindow", "data.entity.state.activeWindow", "data.entity.activeWindow", "activeWindow", "active_window"]
      queue-size-paths: ["newValue.queueSize", "oldValue.queueSize", "data.state.queueSize", "data.queueSize", "data.entity.state.queueSize", "data.entity.queueSize", "queueSize", "queue_size"]
      updated-at-paths: ["data.state.updatedAt", "data.updatedAt", "data.entity.state.updatedAt", "data.entity.updatedAt", "updatedAt", "updated_at"]
      updated-by-paths: ["data.state.updatedBy", "data.updatedBy", "data.entity.state.updatedBy", "data.entity.updatedBy", "updatedBy", "updated_by"]
      visit-manager-id-paths: ["meta.visitManagerId", "meta.targetVisitManagerId", "metadata.visitManagerId", "metadata.targetVisitManagerId", "data.meta.visitManagerId", "data.meta.targetVisitManagerId", "data.visitManagerId", "data.targetVisitManagerId", "visitManagerId", "targetVisitManagerId", "target_visit_manager_id"]
  queue-cache-ttl: 30s
  aggregate-max-branches: 200
  aggregate-request-timeout-millis: 3000
  branch-state-cache-ttl: 15s
  branch-state-event-refresh-debounce: 2s
  visit-managers:
    - id: vm-main
      base-url: http://localhost:8081
      region-id: ru-central
      active: true
    - id: vm-backup
      base-url: http://localhost:8082
      region-id: ru-backup
      active: true
  branch-routing:
    BR-001: vm-main
  branch-fallback-routing:
    BR-001: vm-backup
  simulated-unavailable-targets: []
