openapi: 3.0.1
info:
  title: Integration API
  description: "Интеграционный API для маршрутизации запросов, event-driven синхро\
    низации и programmable-интеграций."
  contact:
    name: Integration API Team
  license:
    name: Proprietary
  version: v1
servers:
- url: /
  description: Текущий адрес сервиса
- url: http://localhost:8080
  description: Локальный запуск
security:
- apiKeyAuth: []
- bearerAuth: []
tags:
- name: Integration Gateway
  description: REST-операции очередей/визитов/состояния отделений
- name: Eventing
  description: Ingest/replay/DLQ/snapshot интерфейсы event pipeline
- name: Programmable API
  description: Управление и запуск программируемых endpoint-ов и Groovy-скриптов
- name: Internal Auth
  description: Получение internal JWT для технических клиентов
- name: Health
  description: Liveness/readiness проверки и сводное состояние системы
paths:
  /api/v1/auth/token:
    post:
      tags:
      - Internal Auth
      summary: Получить internal токен
      description: Выдает токен для technical client в internal режиме безопасности.
      operationId: token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalTokenRequest"
        required: true
      responses:
        "200":
          description: token 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalTokenResponse"
  /api/v1/branches/states:
    get:
      tags:
      - Integration Gateway
      summary: Снимок кэша состояний отделений
      description: Возвращает текущий in-memory снимок cache актуальных состояний
        отделений.
      operationId: branchStatesSnapshot
      responses:
        "200":
          description: branchStatesSnapshot 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BranchStateDto"
  /api/v1/branches/{branchId}/state:
    get:
      tags:
      - Integration Gateway
      summary: Получить состояние отделения
      description: "Возвращает состояние отделения из кэша, при промахе запрашивае\
        т VisitManager."
      operationId: branchState
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: target
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Состояние отделения получено.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchStateDto"
        "404":
          description: Отделение не найдено.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
      - Integration Gateway
      summary: Обновить состояние отделения
      description: Проксирует обновление состояния отделения в VisitManager и актуализирует
        локальный кэш.
      operationId: updateBranchState
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: target
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchStateUpdateRequest"
        required: true
      responses:
        "200":
          description: Состояние отделения обновлено.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchStateDto"
        "400":
          description: Ошибка валидации body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Недостаточно прав branch-state-manage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/branches/{branchId}/state/refresh:
    post:
      tags:
      - Integration Gateway
      summary: Принудительно обновить состояние отделения
      description: Синхронизирует кэш состояния отделения с VisitManager независимо
        от текущего cache-hit.
      operationId: refreshBranchState
      parameters:
      - name: branchId
        in: path
        required: true
        schema:
          type: string
      - name: target
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: refreshBranchState 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchStateDto"
  /api/v1/events/capabilities:
    get:
      tags:
      - Eventing
      summary: Capabilities eventing API
      description: Список доступных возможностей текущего eventing-инкремента.
      operationId: capabilities
      responses:
        "200":
          description: capabilities 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingCapabilities"
  /api/v1/events/dlq:
    get:
      tags:
      - Eventing
      summary: DLQ snapshot
      description: Текущий список событий в DLQ (in-memory).
      operationId: dlq
      parameters:
      - name: eventType
        in: query
        required: true
        schema:
          type: string
      - name: source
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 100
      - name: offset
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 0
      - name: from
        in: query
        required: true
        schema:
          type: string
      - name: to
        in: query
        required: true
        schema:
          type: string
      - name: desc
        in: query
        required: true
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: dlq 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationEvent"
    delete:
      tags:
      - Eventing
      summary: Очистить DLQ
      description: Удаляет все события из in-memory DLQ.
      operationId: clearDlq
      responses:
        "200":
          description: clearDlq 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/events/dlq/{eventId}:
    get:
      tags:
      - Eventing
      summary: Получить событие из DLQ
      description: Возвращает одно событие по eventId из in-memory DLQ.
      operationId: dlqById
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: dlqById 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationEvent"
    delete:
      tags:
      - Eventing
      summary: Удалить событие из DLQ
      description: Удаляет событие из DLQ по eventId.
      operationId: removeFromDlq
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: removeFromDlq 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/events/export:
    get:
      tags:
      - Eventing
      summary: Экспорт snapshot eventing
      description: Экспорт in-memory состояния eventing для миграции/диагностики.
      operationId: exportSnapshot
      responses:
        "200":
          description: exportSnapshot 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingSnapshot"
  /api/v1/events/import:
    post:
      tags:
      - Eventing
      summary: Импорт snapshot eventing
      description: Импортирует in-memory состояние eventing.
      operationId: importSnapshot
      parameters:
      - name: clearBeforeImport
        in: query
        required: true
        schema:
          type: boolean
          default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventingSnapshot"
        required: true
      responses:
        "200":
          description: importSnapshot 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingImportResult"
  /api/v1/events/import/analyze:
    post:
      tags:
      - Eventing
      summary: Расширенный анализ snapshot import
      description: "Возвращает dry-run анализ import (валидность, прогноз размеров\
        , переполнения лимитов)."
      operationId: analyzeImportSnapshot
      parameters:
      - name: clearBeforeImport
        in: query
        required: true
        schema:
          type: boolean
          default: false
      - name: strictPolicies
        in: query
        required: true
        schema:
          type: boolean
          default: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventingSnapshot"
        required: true
      responses:
        "200":
          description: analyzeImportSnapshot 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingImportAnalysis"
  /api/v1/events/import/preview:
    post:
      tags:
      - Eventing
      summary: Предпросмотр импорта snapshot
      description: Показывает итоги будущего импорта без изменения состояния.
      operationId: previewImportSnapshot
      parameters:
      - name: clearBeforeImport
        in: query
        required: true
        schema:
          type: boolean
          default: false
      - name: strictPolicies
        in: query
        required: true
        schema:
          type: boolean
          default: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventingSnapshot"
        required: true
      responses:
        "200":
          description: previewImportSnapshot 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingImportResult"
  /api/v1/events/import/validate:
    post:
      tags:
      - Eventing
      summary: Валидация snapshot
      description: Проверяет корректность snapshot и возвращает список нарушений без
        изменения состояния.
      operationId: validateSnapshot
      parameters:
      - name: strictPolicies
        in: query
        required: true
        schema:
          type: boolean
          default: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventingSnapshot"
        required: true
      responses:
        "200":
          description: validateSnapshot 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingSnapshotValidation"
  /api/v1/events/inbox/recover-stale:
    post:
      tags:
      - Eventing
      summary: Восстановить stale inbox processing
      description: Переводит зависшие PROCESSING-записи inbox в FAILED по timeout
        policy.
      operationId: recoverStaleInbox
      responses:
        "200":
          description: recoverStaleInbox 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/events/ingest:
    post:
      tags:
      - Eventing
      summary: Принять событие
      description: Обработка через ingestion/validation/idempotency/retry/DLQ pipeline.
      operationId: ingest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationEvent"
        required: true
      responses:
        "200":
          description: ingest 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventProcessingResult"
  /api/v1/events/limits:
    get:
      tags:
      - Eventing
      summary: Лимиты eventing
      description: Текущие лимиты и политики import-governance.
      operationId: limits
      responses:
        "200":
          description: limits 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingLimits"
  /api/v1/events/maintenance/preview:
    get:
      tags:
      - Eventing
      summary: Предпросмотр maintenance
      description: Показывает сколько записей будет удалено без фактических изменений.
      operationId: previewMaintenance
      responses:
        "200":
          description: previewMaintenance 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingMaintenanceReport"
  /api/v1/events/maintenance/run:
    post:
      tags:
      - Eventing
      summary: Запустить maintenance eventing
      description: Prune/trim in-memory DLQ и processed store по retention/threshold
        policy.
      operationId: runMaintenance
      responses:
        "200":
          description: runMaintenance 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingMaintenanceReport"
  /api/v1/events/outbox:
    get:
      tags:
      - Eventing
      summary: Снимок outbox
      description: "Возвращает события, ожидающие отправки или завершившиеся ошибк\
        ой отправки."
      operationId: outbox
      parameters:
      - name: limit
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 100
      responses:
        "200":
          description: outbox 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventOutboxMessage"
  /api/v1/events/outbox/flush:
    post:
      tags:
      - Eventing
      summary: Повторная отправка outbox
      description: Пытается повторно отправить pending/failed outbox-сообщения.
      operationId: flushOutbox
      parameters:
      - name: limit
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 100
      responses:
        "200":
          description: flushOutbox 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventProcessingResult"
  /api/v1/events/outbox/{eventId}:
    get:
      tags:
      - Eventing
      summary: Получить outbox-сообщение
      description: Возвращает запись outbox по eventId.
      operationId: outboxById
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: outboxById 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventOutboxMessage"
  /api/v1/events/processed:
    get:
      tags:
      - Eventing
      summary: Список обработанных событий
      description: Снимок in-memory replay store.
      operationId: processed
      parameters:
      - name: eventType
        in: query
        required: true
        schema:
          type: string
      - name: source
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 100
      - name: offset
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 0
      - name: from
        in: query
        required: true
        schema:
          type: string
      - name: to
        in: query
        required: true
        schema:
          type: string
      - name: desc
        in: query
        required: true
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: processed 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationEvent"
    delete:
      tags:
      - Eventing
      summary: Очистить processed store
      description: Очищает in-memory replay store и inbox idempotency.
      operationId: clearProcessed
      responses:
        "200":
          description: clearProcessed 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/events/processed/{eventId}:
    get:
      tags:
      - Eventing
      summary: Получить обработанное событие
      description: Возвращает событие из replay store по eventId.
      operationId: processedById
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: processedById 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationEvent"
  /api/v1/events/replay-dlq:
    post:
      tags:
      - Eventing
      summary: Bulk replay из DLQ
      description: Повторно обрабатывает до N событий из DLQ.
      operationId: replayDlqBulk
      parameters:
      - name: limit
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 100
      responses:
        "200":
          description: replayDlqBulk 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventProcessingResult"
  /api/v1/events/replay-dlq/{eventId}:
    post:
      tags:
      - Eventing
      summary: Replay события из DLQ
      description: "Повторная обработка события, попавшего в DLQ."
      operationId: replayDlq
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: replayDlq 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventProcessingResult"
  /api/v1/events/replay/{eventId}:
    post:
      tags:
      - Eventing
      summary: Replay события
      description: Повторная обработка ранее успешно сохраненного события.
      operationId: replay
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: replay 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventProcessingResult"
  /api/v1/events/stats:
    get:
      tags:
      - Eventing
      summary: Статистика eventing
      description: Операционные метрики eventing pipeline (in-memory).
      operationId: stats
      responses:
        "200":
          description: stats 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingStats"
    delete:
      tags:
      - Eventing
      summary: Сброс статистики eventing
      description: Сбрасывает in-memory счетчики eventing pipeline.
      operationId: resetStats
      responses:
        "200":
          description: resetStats 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/events/stats/health:
    get:
      tags:
      - Eventing
      summary: Здоровье eventing
      description: Оценка состояния eventing по порогам DLQ/duplicate.
      operationId: health
      responses:
        "200":
          description: health 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventingHealth"
  /api/v1/events/version:
    get:
      tags:
      - Eventing
      summary: Версия eventing stage
      description: Текущий stage eventing-функционала.
      operationId: version
      responses:
        "200":
          description: version 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/v1/metrics/visit-managers:
    get:
      tags:
      - Integration Gateway
      summary: Метрики вызовов VisitManager
      description: Возвращает счетчики успешных и ошибочных обращений по каждому target
        VisitManager.
      operationId: metrics
      responses:
        "200":
          description: metrics 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisitManagerMetricDto"
  /api/v1/program/messages/inbound:
    post:
      tags:
      - Programmable API
      summary: Обработать входящее сообщение шины
      description: Выполняет Groovy-реакции на сообщения брокеров/шин заказчика.
      operationId: reactOnInboundMessage
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InboundMessageReactionRequest"
        required: true
      responses:
        "200":
          description: reactOnInboundMessage 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /api/v1/program/scripts:
    get:
      tags:
      - Programmable API
      summary: Список Groovy-скриптов
      description: Возвращает все сохраненные скрипты для панели управления и редактора.
      operationId: listScripts
      responses:
        "200":
          description: listScripts 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroovyScriptInfoDto"
  /api/v1/program/scripts/validate:
    post:
      tags:
      - Programmable API
      summary: Валидировать текст скрипта
      description: Проверяет синтаксис перед сохранением (editor validate).
      operationId: validateScriptBody
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroovyScriptUpsertRequest"
        required: true
      responses:
        "200":
          description: validateScriptBody 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/program/scripts/{scriptId}:
    get:
      tags:
      - Programmable API
      summary: Получить Groovy-скрипт
      description: Возвращает сохраненный Groovy-скрипт по id.
      operationId: getScript
      parameters:
      - name: scriptId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getScript 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroovyScriptInfoDto"
    put:
      tags:
      - Programmable API
      summary: Сохранить Groovy-скрипт
      description: Сохраняет/обновляет Groovy-скрипт в Redis (или fallback-хранилище).
      operationId: saveScript
      parameters:
      - name: scriptId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroovyScriptUpsertRequest"
        required: true
      responses:
        "200":
          description: saveScript 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroovyScriptInfoDto"
    delete:
      tags:
      - Programmable API
      summary: Удалить Groovy-скрипт
      description: Удаляет Groovy-скрипт из Redis (или fallback-хранилища).
      operationId: deleteScript
      parameters:
      - name: scriptId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: deleteScript 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/program/scripts/{scriptId}/debug:
    post:
      tags:
      - Programmable API
      summary: Debug-выполнение скрипта
      description: "Базовый инструмент отладки: выполняет скрипт и возвращает резу\
        льтат/ошибку с метрикой времени."
      operationId: debugScript
      parameters:
