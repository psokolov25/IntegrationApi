          example: integration-api
        timestamp:
          type: string
          description: Момент времени формирования ответа.
          format: date-time
        components:
          type: object
          additionalProperties:
            type: string
          description: Статусы подкомпонентов и режимов.
      description: Структура health-ответа.
    InboundMessageReactionRequest:
      required:
      - broker_id
      - headers
      - key
      - payload
      - script_id
      - topic
      type: object
      properties:
        broker_id:
          type: string
        topic:
          type: string
        key:
          type: string
        payload:
          type: object
          additionalProperties: true
        headers:
          type: object
          additionalProperties:
            type: string
        script_id:
          type: string
      description: Запрос на обработку входящего сообщения от шины/брокера заказчика.
    IntegrationEvent:
      required:
      - event_id
      - event_type
      - occurred_at
      - payload
      - source
      type: object
      properties:
        event_id:
          type: string
        event_type:
          type: string
        source:
          type: string
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
      description: Унифицированное входящее интеграционное событие.
    IntegrationTemplateExportRequest:
      type: object
      properties:
        template_id:
          type: string
          description: Идентификатор шаблона
          example: custom-branch-sync
        name:
          type: string
          description: Название шаблона
          example: Кастомная синхронизация branch-state
        description:
          type: string
          description: Описание шаблона
        script_ids:
          type: array
          description: Список scriptId для включения в архив
          items:
            type: string
        parameter_defaults:
          type: object
          additionalProperties:
            type: string
          description: Значения по умолчанию для параметров (key -> defaultValue)
      description: Параметры экспорта programmable-обработчиков в ITS-архив
    IntegrationTemplateParameterDto:
      type: object
      properties:
        key:
          type: string
          description: Ключ параметра для подстановки в Groovy-шаблон
          example: vmBaseUrl
        label:
          type: string
          description: Человекочитаемое имя параметра
          example: Базовый URL VisitManager
        description:
          type: string
          description: Подсказка для оператора в GUI
          example: URL сервиса VisitManager для REST-вызовов
        required:
          type: boolean
          description: Обязателен ли параметр при импорте
        default_value:
          type: string
          description: Значение по умолчанию
      description: "Параметр integration template: структура и значение по умолчан\
        ию"
    IntegrationTemplatePreviewDto:
      type: object
      properties:
        template_id:
          type: string
          description: Идентификатор шаблона
          example: visitmanager-core
        name:
          type: string
          description: Название шаблона
          example: VisitManager core templates
        description:
          type: string
          description: Описание шаблона
        version:
          type: string
          description: Версия шаблона
          example: 1.0.0
        parameters:
          type: array
          description: Список параметров для подстановки
          items:
            $ref: "#/components/schemas/IntegrationTemplateParameterDto"
        scripts:
          type: array
          description: "Скрипты, входящие в архив"
          items:
            $ref: "#/components/schemas/IntegrationTemplateScriptDto"
      description: "Предпросмотр import-архива ITS: скрипты, параметры и метаданны\
        е"
    IntegrationTemplateScriptDto:
      type: object
      properties:
        script_id:
          type: string
          description: Идентификатор скрипта внутри Integration API
          example: visit-created-handler
        type:
          type: string
          description: Тип programmable-скрипта
          example: MESSAGE_BUS_REACTION
        description:
          type: string
          description: Описание назначения скрипта
          example: Реакция на входящие события VISIT_CREATED
        file:
          type: string
          description: Путь к groovy-файлу внутри ITS-архива
          example: scripts/visit-created-handler.groovy
      description: "Скрипт-обработчик, входящий в integration template"
    InternalTokenRequest:
      required:
      - client_id
      - client_secret
      type: object
      properties:
        client_id:
          minLength: 1
          type: string
        client_secret:
          minLength: 1
          type: string
      description: Запрос на получение internal access token.
    InternalTokenResponse:
      required:
      - access_token
      - expires_in
      - token_type
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
          format: int64
      description: Ответ выдачи internal access token.
    QueueItemDto:
      type: object
      properties:
        queue_id:
          type: string
          description: Идентификатор очереди.
          example: Q-101
        queue_name:
          type: string
          description: Название очереди.
          example: Кредитные карты
        waiting_count:
          type: integer
          description: Количество ожидающих в очереди.
          format: int32
          example: 7
      description: Элемент списка очередей.
    QueueListResponse:
      type: object
      properties:
        branch_id:
          type: string
          description: Идентификатор отделения.
          example: BR-001
        source_visit_manager_id:
          type: string
          description: Идентификатор VisitManager-источника.
          example: vm-main
        queues:
          type: array
          description: Нормализованный список очередей.
          items:
            $ref: "#/components/schemas/QueueItemDto"
        cached:
          type: boolean
          description: "Признак, что данные выданы из кэша."
      description: Ответ со списком очередей конкретного отделения.
    ScriptExecutionRequest:
      type: object
      properties:
        payload:
          type: array
          description: Бизнес payload для логики скрипта
          items:
            type: object
        parameters:
          type: object
          additionalProperties: true
          description: Параметры выполнения (100% передаются в binding как params/parameters)
        context:
          type: object
          additionalProperties: true
          description: "Дополнительный контекст выполнения (например correlationId,\
            \ origin, stage)"
      description: "Запрос выполнения скрипта: payload + параметры + контекст"
    VisitManagerMetricDto:
      required:
      - error_count
      - success_count
      - target
      type: object
      properties:
        target:
          type: string
        success_count:
          type: integer
          format: int64
        error_count:
          type: integer
          format: int64
      description: Метрика вызовов по конкретной инсталляции VisitManager.
