components:
  schemas:
    AggregatedQueuesResponse:
      type: object
      properties:
        successful:
          type: array
          description: Успешно полученные ответы по отделениям.
          items:
            $ref: "#/components/schemas/QueueListResponse"
        failed:
          type: array
          description: "Ошибки по отделениям, которые не удалось получить."
          items:
            $ref: "#/components/schemas/AggregatedQueuesResponse.BranchError"
        partial:
          type: boolean
          description: Признак частичной деградации (partial availability).
      description: Агрегированный результат запросов очередей по нескольким отделениям.
    AggregatedQueuesResponse.BranchError:
      type: object
      properties:
        branch_id:
          type: string
          description: Идентификатор отделения.
          example: BR-404
        target:
          type: string
          description: Целевой VisitManager.
          example: vm-backup
        message:
          type: string
          description: Текст ошибки.
          example: Таймаут при обращении к VisitManager
      description: Ошибка агрегации для конкретного отделения.
    BranchStateDto:
      type: object
      properties:
        branch_id:
          type: string
          description: Идентификатор отделения.
          example: BR-001
        source_visit_manager_id:
          type: string
          description: Идентификатор VisitManager-источника.
          example: vm-main
        status:
          type: string
          description: Статус отделения.
          example: OPEN
        active_window:
          type: string
          description: Активное окно обслуживания.
          example: 09:00-18:00
        queue_size:
          type: integer
          description: Число посетителей в очередях.
          format: int32
          example: 4
        updated_at:
          type: string
          description: Время последнего обновления состояния.
          format: date-time
        cached:
          type: boolean
          description: "Признак, что данные взяты из кэша."
        updated_by:
          type: string
          description: "Идентификатор пользователя/системы, выполнившей изменение."
          example: system:eventing
      description: Текущее состояние отделения.
    BranchStateUpdateRequest:
      required:
      - active_window
      - queue_size
      - status
      - updated_by
      type: object
      properties:
        status:
          minLength: 1
          type: string
        active_window:
          minLength: 1
          type: string
        queue_size:
          minimum: 0
          type: integer
          format: int32
        updated_by:
          minLength: 1
          type: string
      description: Команда обновления состояния отделения для кастомных внешних пультов.
    CallVisitorRequest:
      required:
      - branch_id
      - idempotency_key
      - operator_id
      - queue_id
      type: object
      properties:
        branch_id:
          minLength: 1
          type: string
          description: Идентификатор отделения.
          example: BR-001
        queue_id:
          minLength: 1
          type: string
          description: Идентификатор очереди.
          example: Q-101
        operator_id:
          minLength: 1
          type: string
          description: Идентификатор оператора.
          example: operator-17
        idempotency_key:
          minLength: 1
          type: string
          description: Ключ идемпотентности операции.
          example: 9aa878b7-3afe-4f53-8488-a9f9357f95e0
      description: Команда вызова посетителя.
    CallVisitorResponse:
      type: object
      properties:
        visit_id:
          type: string
          description: Идентификатор визита.
          example: VIS-7788
        status:
          type: string
          description: Итоговый статус операции вызова.
          example: CALLED
        source_visit_manager_id:
          type: string
          description: "Идентификатор VisitManager, обработавшего операцию."
          example: vm-main
      description: Результат вызова посетителя.
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Машиночитаемый код ошибки.
          example: validation_error
        message:
          type: string
          description: Сообщение об ошибке.
          example: Параметр branchId обязателен.
        status:
          type: integer
          description: HTTP статус ответа.
          format: int32
          example: 400
        method:
          type: string
          description: HTTP-метод запроса.
          example: POST
        path:
          type: string
          description: Путь запроса.
          example: /api/v1/events/ingest
        timestamp:
          type: string
          description: "Время формирования ошибки (UTC, ISO-8601)."
          format: date-time
        trace_id:
          type: string
          description: Корреляционный идентификатор для трассировки.
          example: 5c9d2f8b4fcb4cb2
      description: Единый формат ошибки API.
    EventOutboxMessage:
      required:
      - attempts
      - event
      - event_id
      - last_error
      - next_retry_at
      - status
      - updated_at
      type: object
      properties:
        event_id:
          type: string
        event:
          $ref: "#/components/schemas/IntegrationEvent"
        status:
          type: string
        attempts:
          type: integer
          format: int32
        last_error:
          type: string
        next_retry_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      description: Сообщение outbox для надежной отправки во внешний транспорт.
    EventProcessingResult:
      required:
      - attempts
      - event_id
      - message
      - status
      type: object
      properties:
        event_id:
          type: string
        status:
          type: string
        message:
          type: string
        attempts:
          type: integer
          format: int32
      description: Результат обработки события.
    EventingCapabilities:
      required:
      - dlq_operations
      - health_checks
      - ingestion
      - maintenance
      - outbox_reliability
      - replay
      - snapshot_export_import
      type: object
      properties:
        ingestion:
          type: boolean
        replay:
          type: boolean
        dlq_operations:
          type: boolean
        maintenance:
          type: boolean
        snapshot_export_import:
          type: boolean
        health_checks:
          type: boolean
        outbox_reliability:
          type: boolean
      description: Декларация включенных возможностей eventing API.
    EventingHealth:
      required:
      - reasons
      - stats
      - status
      type: object
      properties:
        status:
          type: string
        reasons:
          type: array
          items:
            type: string
        stats:
          $ref: "#/components/schemas/EventingStats"
      description: Оценка здоровья eventing-контура по in-memory метрикам.
    EventingImportAnalysis:
      required:
      - clear_before_import
      - imported_dlq
      - imported_processed
      - limit_usage_percent
      - projected_dlq_overflow
      - projected_processed_overflow
      - projected_stats
      - strict_policies
      - total_imported
      - valid
      - validation
      type: object
      properties:
        valid:
          type: boolean
        strict_policies:
          type: boolean
        clear_before_import:
          type: boolean
        imported_processed:
          type: integer
          format: int32
        imported_dlq:
          type: integer
          format: int32
        total_imported:
          type: integer
          format: int32
        limit_usage_percent:
          type: integer
          format: int32
        projected_processed_overflow:
          type: boolean
        projected_dlq_overflow:
          type: boolean
        projected_stats:
          $ref: "#/components/schemas/EventingStats"
        validation:
          $ref: "#/components/schemas/EventingSnapshotValidation"
      description: Расширенный анализ import snapshot (dry-run).
    EventingImportResult:
