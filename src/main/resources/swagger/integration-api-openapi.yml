      properties:
        snapshot_import_max_events:
          type: integer
          format: int32
        require_matching_processed_keys:
          type: boolean
        reject_cross_list_duplicates:
          type: boolean
        max_dlq_events:
          type: integer
          format: int32
        max_processed_events:
          type: integer
          format: int32
        retention_seconds:
          type: integer
          format: int64
      description: Лимиты и политики import-governance для eventing snapshot.
    EventingMaintenanceReport:
      required:
      - removed_from_dlq
      - removed_from_inbox
      - removed_from_processed
      - stats_after
