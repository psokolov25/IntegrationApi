  /api/v1/queues:
    get:
      tags:
      - Integration Gateway
      summary: Получить очереди по филиалу
      description: "Возвращает нормализованный список очередей, используя кеш и ма\
        ршрутизацию."
      operationId: getQueues
      parameters:
      - name: branchId
        in: query
        description: Идентификатор отделения VisitManager.
        required: true
        schema:
          minLength: 1
          type: string
      - name: target
        in: query
        description: "Явный target VisitManager. Если пусто, используется routing."
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Список очередей получен.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueListResponse"
        "401":
          description: Субъект не аутентифицирован.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Недостаточно прав queue-view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/queues/aggregate:
    get:
      tags:
      - Integration Gateway
      summary: Агрегировать очереди по нескольким филиалам
      description: "Выполняет fan-out вызовы к нескольким VisitManager, возвращая\
        \ partial результат при недоступности части контуров."
      operationId: aggregateQueues
      parameters:
      - name: branchIds
        in: query
        required: true
        schema:
          minLength: 1
          type: string
      responses:
        "200":
          description: aggregateQueues 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregatedQueuesResponse"
  /api/v1/visitors/{visitorId}/call:
    post:
      tags:
      - Integration Gateway
      summary: Вызвать посетителя
      description: Проксирует команду вызова в соответствующий VisitManager с аудитом
        и инвалидацией кеша.
      operationId: callVisitor
      parameters:
      - name: visitorId
        in: path
        description: Идентификатор визита/посетителя.
        required: true
        schema:
          type: string
      - name: target
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallVisitorRequest"
        required: true
      responses:
        "200":
          description: Посетитель вызван.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallVisitorResponse"
        "400":
          description: Некорректное тело команды вызова.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Недостаточно прав queue-call.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health:
    get:
      tags:
