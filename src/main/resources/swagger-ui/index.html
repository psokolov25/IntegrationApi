<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Integration API Swagger UI</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"/>
    <style>
        body { margin: 0; background: #fafafa; }
        .top-note { padding: 10px 16px; background: #003b95; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body>
<div class="top-note">Swagger UI: Integration API (OpenAPI 3)</div>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
    window.ui = SwaggerUIBundle({
        url: '/swagger/integration-api-openapi.yml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        persistAuthorization: true,
        displayRequestDuration: true
    });
</script>
</body>
</html>
